name: Firebase Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
      FIREBASE_APP_HOSTING_BACKEND_ID: ${{ vars.FIREBASE_APP_HOSTING_BACKEND_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Authenticate with service account
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > $HOME/firebase-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=$HOME/firebase-key.json" >> $GITHUB_ENV

      - name: Validate required project id
        run: |
          if [ -z "$FIREBASE_PROJECT_ID" ]; then
            echo "Missing repository variable FIREBASE_PROJECT_ID"
            exit 1
          fi

      - name: Validate repository identity
        run: |
          if [ "$GITHUB_REPOSITORY" != "CaretakerGob/DHL-Raffle" ]; then
            echo "This workflow must run from CaretakerGob/DHL-Raffle."
            echo "Current repository: $GITHUB_REPOSITORY"
            exit 1
          fi

      - name: Deploy Firestore rules and indexes
        run: firebase deploy --project "$FIREBASE_PROJECT_ID" --only firestore:rules,firestore:indexes --non-interactive

      - name: Validate App Hosting build root
        if: ${{ vars.FIREBASE_APP_HOSTING_BACKEND_ID != '' }}
        run: |
          if [ -f "package.json" ]; then
            echo "App root detected at repository root (package.json found)."
            exit 0
          fi

          if [ -f "DHL-Raffle-git/package.json" ]; then
            echo "App root detected at DHL-Raffle-git/package.json (monorepo layout)."
            exit 0
          fi

          echo "Unable to find app package.json for App Hosting deploy."
          echo "Expected either ./package.json or ./DHL-Raffle-git/package.json."
          echo "Set Firebase App Hosting backend root directory to DHL-Raffle-git if using monorepo."
          exit 1

      - name: Deploy Firebase App Hosting backend (optional)
        if: ${{ vars.FIREBASE_APP_HOSTING_BACKEND_ID != '' }}
        run: firebase apphosting:backends:deploy "$FIREBASE_APP_HOSTING_BACKEND_ID" --project "$FIREBASE_PROJECT_ID" --non-interactive
